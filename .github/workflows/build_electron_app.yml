name: Build and Package Electron App

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  version-bump:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensure all tags are fetched
      - name: Bump version and push tag
        uses: phips28/gh-action-bump-version@master      
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          tag-prefix: ''
          minor: true # Change this to 'true' for minor, 'false' for patch updates

  build:
    needs: version-bump
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install distutils
      - name: Install Node.js dependencies
        run: npm install          
      - run: npm run dist --publish=never
      - name: Upload Artifact
        uses: actions/upload-artifact@v2
        with:
          name: ${{ runner.os }}-artifact
          path: dist/${{ matrix.os == 'windows-latest' && '**/*.exe' || '**/*.dmg' }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v3
        with:
          name: windows-latest-artifact
          path: dist
      - uses: actions/download-artifact@v3
        with:
          name: macos-latest-artifact
          path: dist
      - run: git fetch --tags
      - run: echo "RELEASE_TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          tag_name: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GH_TOKEN }}
